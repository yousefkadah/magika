<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E83E8C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#34A853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBC05;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D20;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E83E8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4285F4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M20 20 L60 8 L100 20 L100 62 C100 82 60 108 60 108 C60 108 20 82 20 62 Z" fill="url(#shield)" rx="4"/>

  <!-- File icon inside shield -->
  <path d="M44 32 L64 32 L74 42 L74 78 L44 78 Z" fill="white" opacity="0.95" rx="2"/>
  <path d="M64 32 L64 42 L74 42" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>

  <!-- AI sparkle dots on file -->
  <circle cx="54" cy="52" r="2" fill="url(#grad1)" opacity="0.9"/>
  <circle cx="63" cy="58" r="1.5" fill="#4285F4" opacity="0.9"/>
  <circle cx="56" cy="65" r="1.8" fill="#34A853" opacity="0.9"/>
  <circle cx="65" cy="48" r="1.2" fill="#FBBC05" opacity="0.8"/>
  <circle cx="50" cy="60" r="1.3" fill="#E83E8C" opacity="0.8"/>

  <!-- Scan line effect -->
  <line x1="48" y1="70" x2="70" y2="70" stroke="url(#grad2)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Text: Laravel -->
  <text x="120" y="55" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="300" fill="#555">Laravel</text>

  <!-- Text: Magika -->
  <text x="120" y="88" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="url(#shield)">Magika</text>

  <!-- Tagline -->
  <text x="122" y="108" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="400" fill="#999" letter-spacing="0.5">AI-Powered File Type Validation</text>
</svg>
